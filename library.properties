sentence=LoRaWAN driver for Heltec HT-CT62 (ESP32-C3 + SX1262) modules
paragraph=Thin RadioLib-based LoRaWAN wrapper for the HT-CT62 module. Supports ABP and OTAA activation, AS923-TW band patching (via PlatformIO pre-script), NVS-persisted FCntUp, automatic DR fallback, and config-retain radio sleep for deep-sleep deployments. Module pinout is hard-wired to the HT-CT62 default but every pin can be overridden per board.
